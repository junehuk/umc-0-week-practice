<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AIDO Navbar</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  border-bottom:1px solid #eee;
}

/* 로고 */
.navbar__logo{
  font-size:24px;
  font-weight:bold;
  color:orange;
}

/* 오른쪽 영역 */
.navbar__right{
  display:flex;
  align-items:center;
  gap:40px;
}

/* 메뉴 */
.navbar__menu{
  display:flex;
  gap:30px;
}

.navbar__menu a{
  text-decoration:none;
  color:#333;
  font-size:16px;
}

.navbar__menu a:hover{
  color:orange;
}

/* 언어 선택 */
.language{
  display:flex;
  border:1px solid orange;
  border-radius:20px;
  overflow:hidden;
}

/* radio 숨기기 */
.language input{
  display:none;
}

/* 버튼 */
.language label{
  padding:6px 14px;
  cursor:pointer;
}

/* 선택된 버튼 */
#ko:checked + label{
  background:orange;
  color:white;
}

#eng:checked + label{
  background:orange;
  color:white;
}

/* 반응형 */

@media (max-width: 768px){

  /* 메뉴 텍스트 숨기기 */
  .navbar__menu{
    display:none;
  }

  /* 패딩 줄이기 */
  .navbar{
    padding:20px 20px;
  }

}

</style>

</head>

<body>

<nav class="navbar">

<div class="navbar__logo">
AIDO
</div>

<div class="navbar__right">

  <div class="navbar__menu">
    <a href="#">고양이 친구들</a>
    <a href="#">출시알람받기</a>
  </div>

  <div class="language">

    <input type="radio" name="lang" id="ko" checked>
    <label for="ko">KO</label>

    <input type="radio" name="lang" id="eng">
    <label for="eng">ENG</label>

  </div>

</div>

</nav>

</body>
</html>
