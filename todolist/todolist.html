<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Todo List</title>

<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  padding-top:60px;
}

.app{
  width:600px;
}

header{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  font-size:16px;
  margin-bottom:20px;
}

.lists{
  display:flex;
  gap:30px;
}

section{
  flex:1;
}

h2{
  margin-bottom:10px;
}

ul{
  list-style:none;
  padding:0;
}

li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  background:white;
  margin-bottom:5px;
}

button{
  cursor:pointer;
}

</style>

</head>

<body>

<div class="app">

<header>
<h1>Todo List</h1>
</header>

<input id="todoInput" placeholder="할 일을 입력하고 Enter">

<div class="lists">

<section>
<h2>해야 할 일</h2>
<ul id="todoList"></ul>
</section>

<section>
<h2>해낸 일</h2>
<ul id="doneList"></ul>
</section>

</div>

</div>

<script>

const input = document.getElementById("todoInput");
const todoList = document.getElementById("todoList");
const doneList = document.getElementById("doneList");

let todos = JSON.parse(localStorage.getItem("todos")) || [];

function saveTodos(){
  localStorage.setItem("todos", JSON.stringify(todos));
}

function render(){

  todoList.innerHTML = "";
  doneList.innerHTML = "";

  todos.forEach((todo,index)=>{

    const li = document.createElement("li");
    const span = document.createElement("span");
    span.textContent = todo.text;

    if(todo.done){

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "삭제";

      li.append(span,deleteBtn);
      doneList.append(li);

      deleteBtn.onclick = function(){
        todos.splice(index,1);
        saveTodos();
        render();
      };

    }else{

      const completeBtn = document.createElement("button");
      completeBtn.textContent = "완료";

      li.append(span,completeBtn);
      todoList.append(li);

      completeBtn.onclick = function(){
        todos[index].done = true;
        saveTodos();
        render();
      };

    }

  });

}

input.addEventListener("keydown",function(e){

  if(e.key === "Enter"){

    const text = input.value.trim();
    if(text === "") return;

    todos.push({
      text:text,
      done:false
    });

    input.value="";

    saveTodos();
    render();
  }

});

render();

</script>

</body>
</html>
