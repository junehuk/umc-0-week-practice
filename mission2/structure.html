<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Flex + Grid Layout</title>

<style>

*{
  margin:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* HEADER + MENU */
.top{
  display:flex;
}

.header{
  background:#0d1b2a;
  color:white;
  padding:40px;
  width:30%;
  text-align:center;
  font-size:30px;
}

.menu{
  background:#ef4444;
  color:white;
  padding:40px;
  width:70%;
  text-align:center;
  font-size:30px;
}

/* HERO */
.hero{
  background:#5a86b8;
  color:white;
  text-align:center;
  padding:120px 0;
  font-size:40px;
}

/* MAIN CONTENT */
.content{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  height:350px;
}

/* MAIN */
.main{
  background:#2e3f57;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
}

/* 공백 */
.empty{
  background:white;
}

/* 오른쪽 영역 */
.right{
  display:grid;
  grid-template-rows:1fr 1fr;
}

.image{
  background:#a8c4c7;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
}

.extra{
  background:#56b191;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
}

/* BANNER */
.banner{
  background:#f2c766;
  text-align:center;
  padding:50px;
  font-size:30px;
}

</style>

</head>

<body>

<header class="top">
  <div class="header">HEADER</div>
  <div class="menu">MENU</div>
</header>

<section class="hero">
  HERO
</section>

<section class="content">

  <div class="main">MAIN</div>

  <div class="empty"></div>

  <div class="right">
    <div class="image">IMAGE</div>
    <div class="extra">EXTRA</div>
  </div>

</section>

<footer class="banner">
  BANNER
</footer>

</body>
</html>
